apiVersion: apps/v1
kind: Deployment
metadata:
  name: producer
spec:
  replicas: 1
  selector:
    matchLabels: { app: producer }
  template:
    metadata:
      labels: { app: producer }
    spec:
      containers:
        - name: producer
          image: komals677/producer:3
          ports: [{ containerPort: 5000 }]
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"

---
apiVersion: v1
kind: Service
metadata:
  name: producer
spec:
  selector: { app: producer }
  ports:
    - port: 5000
      targetPort: 5000
