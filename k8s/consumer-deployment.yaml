apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer
spec:
  replicas: 1
  selector:
    matchLabels: { app: consumer }
  template:
    metadata:
      labels: { app: consumer }
    spec:
      containers:
        - name: consumer
          image: komals677/consumer:3
          ports: [{ containerPort: 5001 }]
          env:
            - name: KAFKA_BROKER
              value: "kafka:9092"
---
apiVersion: v1
kind: Service
metadata:
  name: consumer
spec:
  selector: { app: consumer }
  ports:
    - port: 5001
      targetPort: 5001
